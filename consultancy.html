</head>

<body>

<header class="header">

        <img src="images/logo.PNG" alt="中坦达资logo">

    </div>

    <nav>
      <a href="index.html" data-en="Home" data-zh="首页"></a>
      <a href="index.html#services" data-en="Services" data-zh="服务"></a>
      <a href="index.html#stats" data-en="Performance" data-zh="成果"></a>
      <a href="index.html#contact" data-en="Contact" data-zh="联系"></a>
          <button id="langToggle">中文</button>
    </nav>

     <button id="hamburger">☰</button>
  </div>
  <div id="mobileMenu" class="mobile-menu">

  <div class="mobile-content">

    <span class="close-menu" onclick="closeMenu()">×</span>

    <nav class="mobile-nav">
      <a href="index.html" data-en="Home" data-zh="首页"></a>
      <a href="index.html#services" data-en="Services" data-zh="服务"></a>
      <a href="index.html#stats" data-en="Performance" data-zh="成果"></a>
      <a href="index.html#contact" data-en="Contact" data-zh="联系"></a>
      <a href="consultancy.html" data-en="Start Consultation" data-zh="立即咨询"></a>
    </nav>

    <button id="langToggleMobile">中文</button>

  </div>

</div>  
</header>

<section class="section">
  <div class="container">
    <h2 data-en="Why Choose Us" data-zh="为什么选择我们">Why Choose Us</h2>

    <ul>
      <li 
        data-en="Local Tanzanian experts"
        data-zh="本地坦桑尼亚专业团队">
        Local Tanzanian experts
      </li>

      <li 
        data-en="Chinese-speaking support"
        data-zh="提供中文沟通支持">
        Chinese-speaking support
      </li>

      <li 
        data-en="Fast response for urgent cases"
        data-zh="紧急情况快速响应">
        Fast response for urgent cases
      </li>

      <li 
        data-en="Deep understanding of local laws"
        data-zh="深入了解当地法律法规">
        Deep understanding of local laws
      </li>
    </ul>
<br>
    <label class="lang" 
    data-en="Urgency Level" 
    data-zh="紧急程度"></label>

    <select id="urgency" onchange="checkUrgency()">
      <option value="normal" data-en="Not Urgent" data-zh="不紧急">Not Urgent</option>
      <option value="urgent" data-en="Very Urgent" data-zh="非常紧急">Very Urgent</option>
    </select>

    <p class="lang"
    data-en="This helps us to reach urgent client needs"
    data-zh="这有助于我们优先处理紧急客户需求"></p>
    <p id="urgentText" style="display:none;" class="lang"
    data-en="For very urgent cases, please contact us through WeChat"
    data-zh="如非常紧急，请通过微信联系我们">
      <a href="index.html#contact">WeChat</a>
    </p>
</section>
<br>
    <div class="form-box">

  <h3 class="lang"
  data-en="Fill the form below"
  data-zh="请填写以下表格"></h3>

  <form action="https://formspree.io/f/mgopzdqa" method="POST">

    <!-- NAME -->
    <input type="text" name="name" 
    data-en-placeholder="Individual / Company Name"
    data-zh-placeholder=""
    placeholder="Name / 姓名" required>

    <!-- EMAIL -->
    <input type="email" name="email"
    placeholder="Email / 邮箱" required>

    <!-- SERVICE -->
    <select name="service" required>
      <option value="" disabled selected
      data-en="Consulting For"
      data-zh="咨询服务类型">Consulting For</option>

      <option data-en="Company Registration" data-zh="公司注册">Company Registration</option>
      <option data-en="Legal Services" data-zh="法律服务">Legal Services</option>
      <option data-en="Tax and Auditing" data-zh="税务与审计">Tax and Auditing</option>
      <option data-en="Investment Guidance" data-zh="投资指导">Investment Guidance</option>
      <option data-en="Other" data-zh="其他">Other</option>
    </select>

    <!-- LOCATION -->
    <select name="location" required>
      <option value="" disabled selected
      data-en="Select Location"
      data-zh="选择城市">Select Location</option>

      <option data-en="Dar es Salaam" data-zh="达累斯萨拉姆">Dar es Salaam</option>
      <option data-en="Arusha" data-zh="阿鲁沙">Arusha</option>
      <option data-en="Mbeya" data-zh="姆贝亚">Mbeya</option>
      <option data-en="Dodoma" data-zh="多多马">Dodoma</option>
      <option data-en="Mwanza" data-zh="姆万扎">Mwanza</option>
      <option data-en="Other City" data-zh="其他城市">Other City</option>
    </select>

    <!-- TEXTAREA -->
    <textarea name="message"
    data-en-placeholder="Describe your request in detail"
    data-zh-placeholder=""
    placeholder="请详细说明您的需求"></textarea>

    <!-- SUBMIT -->
    <button type="submit" class="btn lang"
    data-en="Submit"
    data-zh="提交"></button>


  </form>

</div>

  </div>
  
    <!-- AGREEMENT -->
    <div class="agree-box">
      <input type="checkbox" checked disabled>
      <span class="lang"
      data-en="By submitting this form I agree to the terms and conditions of 中坦达资."
      data-zh="提交此表格即表示我同意中坦达资的条款与条件。"></span>
    </div>
</section>

<footer class="footer">
    <hr><br>
  <p>
    <a href="#" onclick="openTerms()">Terms & Conditions</a> |
    <a href="#" onclick="openPrivacy()">Privacy Policy</a>
  </p>
   <p>Dar es Salaam, Tanzania  © 2026 中坦达资</p>
</footer>
<br>
<script>

/* MENU */
function toggleMenu(){
  document.getElementById("navMenu").classList.toggle("active");
}

/* LANGUAGE */
let currentLang="zh";

function applyLanguage(){
  document.querySelectorAll("[data-en]").forEach(el=>{
    el.textContent = el.getAttribute("data-"+currentLang);
  });
}

function toggleLang(){
  currentLang=currentLang==="zh"?"en":"zh";
  applyLanguage();
}

window.onload=applyLanguage;

</script>
<script src="script.js"></script>
</body>
</html>
